bpf:
  hostLegacyRouting: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

dnsProxy:
  minTtl: 300

encryption:
  enabled: true
  nodeEncryption: true
  type: wireguard

extraConfig:
  allow-localhost: policy

hostFirewall:
  enabled: true

hubble:
  export:
    static:
      enabled: true
      filePath: /var/run/cilium/hubble/events
  relay:
    enabled: true
  ui:
    enabled: true

ipam:
  mode: kubernetes

k8sServiceHost: localhost
k8sServicePort: 7445

kubeProxyReplacement: true

policyAuditMode: false
policyEnforcementMode: default

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

socketLB:
  hostNamespaceOnly: true