MTU: 0

autoDirectNodeRoutes: true

bpf:
  masquerade: false

debug:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

enableIPv4Masquerade: true

encryption:
  enabled: false
  type: wireguard

envoy:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false

hubble:
  enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - 'flow:sourceContext=pod|ip;destinationContext=pod|ip;labelsContext=source_namespace,destination_namespace,source_pod,destination_pod,traffic_direction'
      - 'drop:sourceContext=pod|ip;destinationContext=pod|ip;labelsContext=source_namespace,destination_namespace,source_pod,destination_pod,traffic_direction'
      - 'dns:query;ignoreAAAA;labelsContext=source_namespace,destination_namespace,source_pod,destination_pod'
      - 'tcp:labelsContext=source_namespace,destination_namespace,source_pod,destination_pod'
      - 'httpV2:labelsContext=source_namespace,destination_namespace,source_pod,destination_pod,traffic_direction'
      - 'icmp:labelsContext=source_namespace,destination_namespace,source_pod,destination_pod'
      - 'port-distribution:labelsContext=source_namespace,destination_namespace,source_pod,destination_pod'
    serviceMonitor:
      enabled: false
  relay:
    enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false
  ui:
    enabled: true
    backend:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    frontend:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4MaskSize: 24
    clusterPoolIPv4PodCIDRList:
      - "10.0.0.0/8"

ipv4:
  enabled: true

ipv4NativeRoutingCIDR: "10.0.0.0/8"

ipv6:
  enabled: false

kubeProxyReplacement: false

operator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
  replicas: 2

policyAuditMode: false
policyEnforcementMode: default

prometheus:
  enabled: true
  serviceMonitor:
    enabled: false

routingMode: native