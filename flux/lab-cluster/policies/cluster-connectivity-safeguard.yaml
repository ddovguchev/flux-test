apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cluster-connectivity-safeguard
spec:
  description: "Safety-net policy to keep node-to-node and internet connectivity available."
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
        - cluster
        - kube-apiserver
        - health
  egress:
    - toEntities:
        - host
        - remote-node
        - cluster
        - kube-apiserver
        - world
