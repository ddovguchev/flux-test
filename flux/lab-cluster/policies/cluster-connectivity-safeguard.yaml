apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cluster-connectivity-safeguard
spec:
  description: "Default deny pod-to-pod traffic cluster-wide, allow only system and explicitly permitted flows."
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
        - health
  egress:
    - toEntities:
        - host
        - remote-node
        - kube-apiserver
        - health
