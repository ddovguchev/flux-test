apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cluster-connectivity-safeguard
spec:
  description: "Default deny pod-to-pod traffic cluster-wide, allow only system and explicitly permitted flows."
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
        - health
  egress:
    - toEntities:
        - host
        - remote-node
        - kube-apiserver
        - health
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: coredns
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:app.kubernetes.io/name: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toCIDRSet:
        - cidr: 10.43.0.10/32
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - world
