# Cilium/Hubble (9962–9965) -> OTLP -> SigNoz (namespace monitoring).
mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    prometheus/cilium:
      config:
        scrape_configs:
          - job_name: cilium-agent
            scrape_interval: 5s
            scrape_timeout: 4s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_k8s_app]
                action: keep
                regex: kube-system;cilium
              - source_labels: [__meta_kubernetes_pod_host_ip]
                target_label: __address__
                replacement: $${1}:9962

          - job_name: cilium-operator
            scrape_interval: 5s
            scrape_timeout: 4s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
                action: keep
                regex: kube-system;cilium-operator
              - source_labels: [__meta_kubernetes_pod_ip]
                target_label: __address__
                replacement: $${1}:9963

          - job_name: cilium-envoy
            scrape_interval: 5s
            scrape_timeout: 4s
            static_configs:
              - targets:
                  - cilium-envoy.kube-system.svc.cluster.local:9964

          - job_name: hubble
            scrape_interval: 5s
            scrape_timeout: 4s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_k8s_app]
                action: keep
                regex: kube-system;cilium
              - source_labels: [__meta_kubernetes_pod_host_ip]
                target_label: __address__
                replacement: $${1}:9965
    filelog/hubble:
      include:
        - /var/log/pods/kube-system_*hubble-observer*/*/*.log
        - /var/log/pods/kube-system_*cilium*/*/*.log
      start_at: beginning
      include_file_path: true
      include_file_name: false
      operators:
        - id: cri_parser
          type: regex_parser
          regex: '^(?P<ts>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) (?P<msg>.*)$'
          timestamp:
            parse_from: attributes.ts
            layout_type: gotime
            layout: '2006-01-02T15:04:05.999999999Z07:00'
        - id: parse_json
          type: json_parser
          parse_from: attributes.msg
          parse_to: body
          if: 'attributes.msg matches "^\\{.*\\}$"'
        - id: set_dataset
          type: add
          field: attributes.log.dataset
          value: cilium.hubble.flow

  processors:
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.node.name
    batch:
      # Faster export cadence so dashboard reflects fresh samples quicker.
      timeout: 2s
      send_batch_size: 512
      send_batch_max_size: 1024

  exporters:
    otlp_grpc:
      # Имя сервиса от Helm-релиза SigNoz: обычно <release>-signoz-otel-collector
      endpoint: monitoring-signoz-otel-collector.monitoring.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
    pipelines:
      metrics:
        receivers: [prometheus/cilium]
        processors: [k8sattributes, batch]
        exporters: [otlp_grpc]
      logs:
        receivers: [filelog/hubble]
        processors: [k8sattributes, batch]
        exporters: [otlp_grpc]

ports:
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

serviceAccount:
  create: true

clusterRole:
  create: true

presets:
  kubernetesAttributes:
    enabled: true
  logsCollection:
    enabled: true
    includeCollectorLogs: false

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
