# Cilium/Hubble (9962–9965) -> OTLP -> SigNoz (namespace monitoring).
mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    prometheus/cilium:
      config:
        scrape_configs:
          - job_name: cilium-agent
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_k8s_app]
                action: keep
                regex: kube-system;cilium
              - source_labels: [__meta_kubernetes_pod_host_ip]
                target_label: __address__
                replacement: $${1}:9962

          - job_name: cilium-operator
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
                action: keep
                regex: kube-system;cilium-operator
              - source_labels: [__meta_kubernetes_pod_ip]
                target_label: __address__
                replacement: $${1}:9963

          - job_name: cilium-envoy
            static_configs:
              - targets:
                  - cilium-envoy.kube-system.svc.cluster.local:9964

          - job_name: hubble
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_k8s_app]
                action: keep
                regex: kube-system;cilium
              - source_labels: [__meta_kubernetes_pod_host_ip]
                target_label: __address__
                replacement: $${1}:9965

  processors:
    batch: {}

  exporters:
    otlp_grpc:
      # Имя сервиса от Helm-релиза SigNoz: обычно <release>-signoz-otel-collector
      endpoint: monitoring-signoz-otel-collector.monitoring.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
    pipelines:
      metrics:
        receivers: [prometheus/cilium]
        processors: [batch]
        exporters: [otlp_grpc]

ports:
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

serviceAccount:
  create: true

clusterRole:
  create: true

presets:
  kubernetesAttributes:
    enabled: false

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
