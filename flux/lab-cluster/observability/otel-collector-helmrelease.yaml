apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-gateway
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: observability
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: cilium
      namespace: flux-system
    - name: signoz
      namespace: flux-system
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.147.1"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: otel-collector-values
      valuesKey: values.yaml
