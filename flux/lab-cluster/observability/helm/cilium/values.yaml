# Cilium CNI + Hubble (метрики/наблюдаемость на уровне сети).
ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"

prometheus:
  enabled: true
  serviceMonitor:
    enabled: false

operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false

envoy:
  prometheus:
    serviceMonitor:
      enabled: false

hubble:
  enabled: true
  relay:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    serviceMonitor:
      enabled: false
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:
          exemplars: true
          labelsContext: source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
